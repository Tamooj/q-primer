<script>
'use strict';

/* ----------------------------------------------------------------
   BankLoader â€” exact copy from index.html
   ---------------------------------------------------------------- */
const BankLoader = (() => {

  const REQUIRED_META     = ['title', 'pool_id', 'version'];
  const REQUIRED_QUESTION = ['id', 'question', 'answers', 'correct'];
  const ALL_ANSWER_KEYS   = ['A', 'B', 'C', 'D', 'E', 'F'];

  const fail = (error) => ({ valid: false, error });

  function validate(bank) {
    if (!bank || typeof bank !== 'object' || Array.isArray(bank)) {
      return fail('File is not a valid JSON object.');
    }
    if (!bank.meta || typeof bank.meta !== 'object' || Array.isArray(bank.meta)) {
      return fail('Missing required "meta" object.');
    }
    for (const field of REQUIRED_META) {
      if (typeof bank.meta[field] !== 'string' || bank.meta[field].trim() === '') {
        return fail(`meta.${field} is required and must be a non-empty string.`);
      }
    }
    if (!Array.isArray(bank.questions)) {
      return fail('Missing required "questions" array.');
    }
    if (bank.questions.length === 0) {
      return fail('Question bank must contain at least one question.');
    }

    const validSubelements = new Set();
    const validGroups      = new Set();
    if (bank.structure !== undefined && bank.structure !== null) {
      if (!Array.isArray(bank.structure.subelements)) {
        return fail('structure.subelements must be an array.');
      }
      for (let si = 0; si < bank.structure.subelements.length; si++) {
        const sub = bank.structure.subelements[si];
        if (!sub.id || typeof sub.id !== 'string') {
          return fail(`structure.subelements[${si}] must have a non-empty string id.`);
        }
        validSubelements.add(sub.id);
        if (Array.isArray(sub.groups)) {
          for (let gi = 0; gi < sub.groups.length; gi++) {
            const g = sub.groups[gi];
            if (!g.id || typeof g.id !== 'string') {
              return fail(`structure.subelements[${si}].groups[${gi}] must have a non-empty string id.`);
            }
            validGroups.add(g.id);
          }
        }
      }
    }
    const hasStructure = validSubelements.size > 0;
    const seenIds = new Set();

    for (let i = 0; i < bank.questions.length; i++) {
      const q  = bank.questions[i];
      const at = `questions[${i}]`;

      if (!q || typeof q !== 'object') return fail(`${at} must be an object.`);

      for (const field of REQUIRED_QUESTION) {
        if (q[field] === undefined || q[field] === null) {
          return fail(`${at}.${field} is required.`);
        }
      }
      if (typeof q.id !== 'string' || q.id.trim() === '') {
        return fail(`${at}.id must be a non-empty string.`);
      }
      if (seenIds.has(q.id)) return fail(`Duplicate question ID: "${q.id}".`);
      seenIds.add(q.id);

      if (typeof q.question !== 'string' || q.question.trim() === '') {
        return fail(`${at}.question must be a non-empty string.`);
      }
      if (typeof q.answers !== 'object' || Array.isArray(q.answers) || q.answers === null) {
        return fail(`${at}.answers must be an object.`);
      }
      const answerKeys = Object.keys(q.answers).sort();
      const n = answerKeys.length;
      if (n < 2 || n > 6) {
        return fail(`${at}.answers must have between 2 and 6 choices. Found: ${n || '(none)'}`);
      }
      const expectedKeys = ALL_ANSWER_KEYS.slice(0, n);
      if (answerKeys.join(',') !== expectedKeys.join(',')) {
        return fail(
          `${at}.answers keys must be a contiguous sequence starting from A ` +
          `(e.g. A,B or A,B,C,D). Found: ${answerKeys.join(',')}`
        );
      }
      for (const k of answerKeys) {
        if (typeof q.answers[k] !== 'string' || q.answers[k].trim() === '') {
          return fail(`${at}.answers.${k} must be a non-empty string.`);
        }
      }
      if (!answerKeys.includes(q.correct)) {
        return fail(
          `${at}.correct must be one of the answer keys (${answerKeys.join(', ')}). ` +
          `Got: "${q.correct}"`
        );
      }

      if (q.annotation !== null && q.annotation !== undefined) {
        if (typeof q.annotation !== 'object' || Array.isArray(q.annotation)) {
          return fail(`${at}.annotation must be an object or null.`);
        }
        if (typeof q.annotation.type !== 'string' || q.annotation.type.trim() === '') {
          return fail(`${at}.annotation.type must be a non-empty string.`);
        }
        if (typeof q.annotation.content !== 'string' || q.annotation.content.trim() === '') {
          return fail(`${at}.annotation.content must be a non-empty string.`);
        }
      }

      if (q.figure !== null && q.figure !== undefined) {
        if (typeof q.figure !== 'object' || Array.isArray(q.figure)) {
          return fail(`${at}.figure must be an object or null.`);
        }
        if (typeof q.figure.file !== 'string' || q.figure.file.trim() === '') {
          return fail(`${at}.figure.file must be a non-empty string.`);
        }
        if (typeof q.figure.alt !== 'string' || q.figure.alt.trim() === '') {
          return fail(`${at}.figure.alt must be a non-empty string (used for accessibility and AI context).`);
        }
      }

      if (q.preamble !== null && q.preamble !== undefined) {
        if (typeof q.preamble !== 'object' || Array.isArray(q.preamble)) {
          return fail(`${at}.preamble must be an object or omitted.`);
        }
        if (typeof q.preamble.file !== 'string' || q.preamble.file.trim() === '') {
          return fail(`${at}.preamble.file must be a non-empty string.`);
        }
        if (typeof q.preamble.label !== 'string' || q.preamble.label.trim() === '') {
          return fail(`${at}.preamble.label must be a non-empty string.`);
        }
      }

      if (hasStructure) {
        if (q.subelement && !validSubelements.has(q.subelement)) {
          return fail(`${at}.subelement "${q.subelement}" is not defined in structure.subelements.`);
        }
        if (q.group && !validGroups.has(q.group)) {
          return fail(`${at}.group "${q.group}" is not defined in structure.`);
        }
      }
    }
    return { valid: true, bank };
  }

  function load(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        let parsed;
        try { parsed = JSON.parse(e.target.result); }
        catch (err) { resolve(fail(`Invalid JSON: ${err.message}`)); return; }
        const result = validate(parsed);
        resolve(result.valid ? { ...result, imageMap: null } : result);
      };
      reader.onerror = () => resolve(fail('Could not read file.'));
      reader.readAsText(file);
    });
  }

  async function loadZip(file) {
    if (typeof JSZip === 'undefined') {
      return fail('JSZip library not loaded. Check your internet connection and reload.');
    }
    let zip;
    try { zip = await JSZip.loadAsync(file); }
    catch (err) { return fail(`Could not read ZIP: ${err.message}`); }

    const bankEntry = zip.file('bank.json');
    if (!bankEntry) return fail('ZIP must contain bank.json at the root level.');

    let parsed;
    try {
      const text = await bankEntry.async('text');
      parsed = JSON.parse(text);
    } catch (err) { return fail(`Invalid JSON in bank.json: ${err.message}`); }

    const result = validate(parsed);
    if (!result.valid) return result;

    const imageMap = new Map();
    const uniqueFigureFiles = [...new Set(
      result.bank.questions
        .filter(q => q.figure && q.figure.file)
        .map(q => q.figure.file)
    )];

    for (const filename of uniqueFigureFiles) {
      const entry = zip.file(`figures/${filename}`);
      if (!entry) return fail(`Figure file not found in ZIP: figures/${filename}`);
      const blob = await entry.async('blob');
      imageMap.set(filename, URL.createObjectURL(blob));
    }

    const preambleMap = new Map();
    const uniquePreambleFiles = [...new Set(
      result.bank.questions
        .filter(q => q.preamble && q.preamble.file)
        .map(q => q.preamble.file)
    )];
    for (const filename of uniquePreambleFiles) {
      const entry = zip.file(`preambles/${filename}`);
      if (!entry) return fail(`Preamble file not found in ZIP: preambles/${filename}`);
      const text = await entry.async('text');
      preambleMap.set(filename, text);
    }

    return { valid: true, bank: result.bank, imageMap, preambleMap };
  }

  return { validate, load, loadZip };
})();


/* ----------------------------------------------------------------
   Helpers
   ---------------------------------------------------------------- */

// A minimal 1Ã—1 transparent PNG (for creating test ZIPs with real image data)
function makeTinyPng() {
  const b64 = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12NgAAIABQAABjE+ibYAAAAASUVORK5CYII=';
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function makeMinimalBank(overrides = {}) {
  return {
    meta: { title: 'Test Bank', pool_id: 'test-v1', version: '1.0', ...overrides.meta },
    questions: overrides.questions ?? [{
      id: 'Q001',
      question: 'Which answer is correct?',
      answers: { A: 'Alpha', B: 'Beta', C: 'Gamma', D: 'Delta' },
      correct: 'A',
      annotation: null,
    }],
  };
}

function makeBankWithFigure() {
  return {
    meta: { title: 'Figure Test', pool_id: 'fig-test-v1', version: '1.0' },
    questions: [{
      id: 'Q001',
      question: 'What is shown in the figure?',
      figure: { file: 'diagram.png', alt: 'A simple circuit diagram' },
      answers: { A: 'Alpha', B: 'Beta', C: 'Gamma', D: 'Delta' },
      correct: 'B',
      annotation: null,
    }],
  };
}

/** Build a File object from a JSZip instance. */
async function zipToFile(zip, filename = 'bank.zip') {
  const blob = await zip.generateAsync({ type: 'blob' });
  return new File([blob], filename, { type: 'application/zip' });
}

/** Create a valid zip with bank.json, optional figures, and optional preambles. */
async function makeValidZip(bankObj, figures = {}, preambles = {}) {
  const zip = new JSZip();
  zip.file('bank.json', JSON.stringify(bankObj));
  for (const [name, data] of Object.entries(figures)) {
    zip.folder('figures').file(name, data);
  }
  for (const [name, text] of Object.entries(preambles)) {
    zip.folder('preambles').file(name, text);
  }
  return zipToFile(zip);
}


/* ----------------------------------------------------------------
   Runner (async-capable)
   ---------------------------------------------------------------- */
let _passed = 0, _failed = 0;
const _suites = [];
let _cur = null;

function suite(name) { _cur = { name, tests: [] }; _suites.push(_cur); }

async function test(desc, fn) {
  try {
    await fn();
    _passed++;
    _cur.tests.push({ desc, status: 'pass', detail: null });
  } catch(e) {
    _failed++;
    _cur.tests.push({ desc, status: 'fail', detail: e.message });
  }
}

const assert = {
  eq(a, b)         { if (a !== b)   throw new Error(`Expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`); },
  true(v)          { if (v !== true)  throw new Error(`Expected true, got ${JSON.stringify(v)}`); },
  false(v)         { if (v !== false) throw new Error(`Expected false, got ${JSON.stringify(v)}`); },
  null(v)          { if (v !== null)  throw new Error(`Expected null, got ${JSON.stringify(v)}`); },
  notNull(v)       { if (v == null)   throw new Error('Expected non-null'); },
  includes(s, sub) { if (!s.includes(sub)) throw new Error(`Expected "${s}" to include "${sub}"`); },
  hasEl(el, sel)   { if (!el.querySelector(sel)) throw new Error(`No element matching "${sel}"`); },
  noEl(el, sel)    { if (el.querySelector(sel))  throw new Error(`Unexpected element matching "${sel}"`); },
  textOf(el, sel)  { const n = el.querySelector(sel); if (!n) throw new Error(`No element matching "${sel}"`); return n.textContent; },
};

/* ----------------------------------------------------------------
   renderTagged / renderInline / buildTable
   Exact copies of the functions from index.html (UI module).
   ---------------------------------------------------------------- */
function renderInline(text, container) {
  const parts = text.split(/`([^`\n]+)`/);
  parts.forEach((part, i) => {
    if (i % 2 === 0) {
      if (part) container.appendChild(document.createTextNode(part));
    } else {
      const code = document.createElement('code');
      code.className = 'inline-code';
      code.textContent = part;
      container.appendChild(code);
    }
  });
}

function buildTable(content) {
  const lines = content.trim().split('\n')
    .map(l => l.trim())
    .filter(l => l && !/^[\|:\-\s]+$/.test(l));
  if (!lines.length) return null;
  function parseCells(line) {
    let cells = line.split('|').map(c => c.trim());
    if (cells[0] === '') cells = cells.slice(1);
    if (cells[cells.length - 1] === '') cells = cells.slice(0, -1);
    return cells;
  }
  const table = document.createElement('table');
  table.className = 'q-table';
  const thead = document.createElement('thead');
  const hrow  = document.createElement('tr');
  parseCells(lines[0]).forEach(cell => {
    const th = document.createElement('th');
    renderInline(cell, th);
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);
  if (lines.length > 1) {
    const tbody = document.createElement('tbody');
    lines.slice(1).forEach(line => {
      const tr = document.createElement('tr');
      parseCells(line).forEach(cell => {
        const td = document.createElement('td');
        renderInline(cell, td);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
  }
  return table;
}

function renderTagged(text, container, { paragraphs = false } = {}) {
  const parts = text.split(/(<code>[\s\S]*?<\/code>|<table>[\s\S]*?<\/table>)/);
  parts.forEach((part, i) => {
    if (i % 2 === 0) {
      if (!part) return;
      if (paragraphs) {
        part.split(/\n\n+/).filter(c => c.trim()).forEach(chunk => {
          const p = document.createElement('p');
          renderInline(chunk.trim(), p);
          container.appendChild(p);
        });
      } else {
        renderInline(part, container);
      }
    } else if (part.startsWith('<table>')) {
      const tableEl = buildTable(part.slice(7, -8));
      if (tableEl) container.appendChild(tableEl);
    } else {
      const content = part.slice(6, -7);
      if (content.includes('\n')) {
        const pre = document.createElement('pre');
        const code = document.createElement('code');
        code.textContent = content.replace(/^\n/, '').replace(/\n$/, '');
        pre.appendChild(code);
        container.appendChild(pre);
      } else {
        const code = document.createElement('code');
        code.className = 'inline-code';
        code.textContent = content;
        container.appendChild(code);
      }
    }
  });
}

function render() {
  document.getElementById('loading').remove();
  const container = document.getElementById('results');
  for (const s of _suites) {
    const suiteEl = document.createElement('div');
    suiteEl.className = 'suite';
    const hdr = document.createElement('div');
    hdr.className = 'suite-header';
    hdr.textContent = s.name;
    suiteEl.appendChild(hdr);
    for (const t of s.tests) {
      const row = document.createElement('div');
      row.className = 'test-row';
      const status = document.createElement('span');
      status.className = `test-status ${t.status}`;
      status.textContent = t.status === 'pass' ? 'PASS' : 'FAIL';
      const desc = document.createElement('div');
      desc.className = 'test-desc';
      desc.appendChild(document.createTextNode(t.desc));
      if (t.detail) {
        const d = document.createElement('div');
        d.className = 'test-detail';
        d.textContent = t.detail;
        desc.appendChild(d);
      }
      row.appendChild(status);
      row.appendChild(desc);
      suiteEl.appendChild(row);
    }
    container.appendChild(suiteEl);
  }
  const total = _passed + _failed;
  document.getElementById('pass-count').textContent  = `${_passed} passed`;
  document.getElementById('fail-count').textContent  = `${_failed} failed`;
  document.getElementById('total-count').textContent = `${total} total`;
  document.title = `${_failed > 0 ? 'âœ—' : 'âœ“'} Chunk A ZIP Tests (${_passed}/${total})`;
}


/* ================================================================
   TESTS
   ================================================================ */
async function runTests() {

  /* â”€â”€ Suite 1: Basic ZIP loading â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  suite('BankLoader.loadZip â€” valid bank');

  await test('valid zip with text-only bank returns valid:true', async () => {
    const file   = await makeValidZip(makeMinimalBank());
    const result = await BankLoader.loadZip(file);
    assert.true(result.valid);
  });

  await test('bank object is returned correctly', async () => {
    const bank   = makeMinimalBank();
    const file   = await makeValidZip(bank);
    const result = await BankLoader.loadZip(file);
    assert.eq(result.bank.meta.pool_id, 'test-v1');
    assert.eq(result.bank.questions.length, 1);
  });

  await test('text-only bank returns empty imageMap', async () => {
    const file   = await makeValidZip(makeMinimalBank());
    const result = await BankLoader.loadZip(file);
    assert.true(result.imageMap instanceof Map);
    assert.eq(result.imageMap.size, 0);
  });

  await test('valid zip with figure returns imageMap entry', async () => {
    const bank = makeBankWithFigure();
    const file = await makeValidZip(bank, { 'diagram.png': makeTinyPng() });
    const result = await BankLoader.loadZip(file);
    assert.true(result.valid);
    assert.true(result.imageMap.has('diagram.png'));
  });

  await test('imageMap values are blob: URLs', async () => {
    const bank = makeBankWithFigure();
    const file = await makeValidZip(bank, { 'diagram.png': makeTinyPng() });
    const result = await BankLoader.loadZip(file);
    const url = result.imageMap.get('diagram.png');
    assert.true(url.startsWith('blob:'));
  });

  await test('multiple figures all appear in imageMap', async () => {
    const bank = {
      meta: { title: 'Multi', pool_id: 'multi-v1', version: '1.0' },
      questions: [
        { id: 'Q001', question: 'Q?', figure: { file: 'fig1.png', alt: 'Fig 1' },
          answers: { A:'a',B:'b',C:'c',D:'d' }, correct: 'A', annotation: null },
        { id: 'Q002', question: 'Q?', figure: { file: 'fig2.png', alt: 'Fig 2' },
          answers: { A:'a',B:'b',C:'c',D:'d' }, correct: 'B', annotation: null },
      ],
    };
    const file = await makeValidZip(bank, {
      'fig1.png': makeTinyPng(),
      'fig2.png': makeTinyPng(),
    });
    const result = await BankLoader.loadZip(file);
    assert.true(result.valid);
    assert.eq(result.imageMap.size, 2);
    assert.true(result.imageMap.has('fig1.png'));
    assert.true(result.imageMap.has('fig2.png'));
  });


  /* â”€â”€ Suite 2: ZIP structure errors â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  suite('BankLoader.loadZip â€” ZIP structure errors');

  await test('zip missing bank.json returns error', async () => {
    const zip  = new JSZip();
    zip.file('wrong.json', '{}');
    const file   = await zipToFile(zip);
    const result = await BankLoader.loadZip(file);
    assert.false(result.valid);
    assert.includes(result.error, 'bank.json');
  });

  await test('zip with invalid JSON in bank.json returns error', async () => {
    const zip = new JSZip();
    zip.file('bank.json', 'this is not json {{{');
    const file   = await zipToFile(zip);
    const result = await BankLoader.loadZip(file);
    assert.false(result.valid);
    assert.includes(result.error, 'JSON');
  });

  await test('figure referenced in bank.json but missing from zip returns error', async () => {
    const bank = makeBankWithFigure(); // references diagram.png
    const file = await makeValidZip(bank, {}); // no figures added
    const result = await BankLoader.loadZip(file);
    assert.false(result.valid);
    assert.includes(result.error, 'diagram.png');
  });

  await test('error message includes figures/ path', async () => {
    const bank = makeBankWithFigure();
    const file = await makeValidZip(bank, {});
    const result = await BankLoader.loadZip(file);
    assert.includes(result.error, 'figures/');
  });


  /* â”€â”€ Suite 3: Schema errors propagate through zip â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  suite('BankLoader.loadZip â€” schema errors propagate');

  await test('missing meta returns schema error', async () => {
    const bad = { questions: [{ id:'Q1', question:'Q?', answers:{A:'a',B:'b',C:'c',D:'d'}, correct:'A' }] };
    const file = await makeValidZip(bad);
    const result = await BankLoader.loadZip(file);
    assert.false(result.valid);
