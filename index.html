  <!-- ============================================================
       JAVASCRIPT
       ============================================================ -->
  <script>
    'use strict';

    /* ============================================================
       MODULE: BankLoader
       Validates and loads question bank JSON files.
       Pure functions — no DOM access, no side effects.
       ============================================================ */
    const BankLoader = (() => {

      const REQUIRED_META     = ['title', 'pool_id', 'version'];
      const REQUIRED_QUESTION = ['id', 'question', 'answers', 'correct'];
      const ALL_ANSWER_KEYS   = ['A', 'B', 'C', 'D', 'E', 'F'];

      /** Convenience: return a failure result. */
      const fail = (error) => ({ valid: false, error });

      /**
       * Validate a parsed bank object against the Q-Primer schema.
       *
       * Rules enforced:
       *   1. All required fields present at every level
       *   2. answers has 2–6 keys forming a contiguous sequence from A (A,B or A,B,C … A–F)
       *   3. correct is one of the keys present in answers
       *   4. All question IDs are unique
       *   5. If structure present: subelement/group refs are defined
       *   6. No question or answer text is empty
       *
       * @param  {unknown} bank
       * @returns {{ valid: true, bank: object } | { valid: false, error: string }}
       */
      function validate(bank) {

        // ── Top-level shape ──────────────────────────────────────
        if (!bank || typeof bank !== 'object' || Array.isArray(bank)) {
          return fail('File is not a valid JSON object.');
        }

        // ── meta ─────────────────────────────────────────────────
        if (!bank.meta || typeof bank.meta !== 'object' || Array.isArray(bank.meta)) {
          return fail('Missing required "meta" object.');
        }
        for (const field of REQUIRED_META) {
          if (typeof bank.meta[field] !== 'string' || bank.meta[field].trim() === '') {
            return fail(`meta.${field} is required and must be a non-empty string.`);
          }
        }

        // ── questions ─────────────────────────────────────────────
        if (!Array.isArray(bank.questions)) {
          return fail('Missing required "questions" array.');
        }
        if (bank.questions.length === 0) {
          return fail('Question bank must contain at least one question.');
        }

        // ── structure lookup tables (if structure is present) ─────
        const validSubelements = new Set();
        const validGroups      = new Set();

        if (bank.structure !== undefined && bank.structure !== null) {
          if (!Array.isArray(bank.structure.subelements)) {
            return fail('structure.subelements must be an array.');
          }
          for (let si = 0; si < bank.structure.subelements.length; si++) {
            const sub = bank.structure.subelements[si];
            if (!sub.id || typeof sub.id !== 'string') {
              return fail(`structure.subelements[${si}] must have a non-empty string id.`);
            }
            validSubelements.add(sub.id);
            if (Array.isArray(sub.groups)) {
              for (let gi = 0; gi < sub.groups.length; gi++) {
                const g = sub.groups[gi];
                if (!g.id || typeof g.id !== 'string') {
                  return fail(`structure.subelements[${si}].groups[${gi}] must have a non-empty string id.`);
                }
                validGroups.add(g.id);
              }
            }
          }
        }

        const hasStructure = validSubelements.size > 0;

        // ── per-question validation ───────────────────────────────
        const seenIds = new Set();

        for (let i = 0; i < bank.questions.length; i++) {
          const q  = bank.questions[i];
          const at = `questions[${i}]`;

          if (!q || typeof q !== 'object') {
            return fail(`${at} must be an object.`);
          }

          // Required fields exist
          for (const field of REQUIRED_QUESTION) {
            if (q[field] === undefined || q[field] === null) {
              return fail(`${at}.${field} is required.`);
            }
          }

          // id: non-empty string, globally unique
          if (typeof q.id !== 'string' || q.id.trim() === '') {
            return fail(`${at}.id must be a non-empty string.`);
          }
          if (seenIds.has(q.id)) {
            return fail(`Duplicate question ID: "${q.id}".`);
          }
          seenIds.add(q.id);

          // question text: non-empty string
          if (typeof q.question !== 'string' || q.question.trim() === '') {
            return fail(`${at}.question must be a non-empty string.`);
          }

          // answers: object with exactly keys A, B, C, D
          if (typeof q.answers !== 'object' || Array.isArray(q.answers) || q.answers === null) {
            return fail(`${at}.answers must be an object.`);
          }
          const answerKeys = Object.keys(q.answers).sort();
          const n = answerKeys.length;
          if (n < 2 || n > 6) {
            return fail(`${at}.answers must have between 2 and 6 choices. Found: ${n || '(none)'}`);
          }
          const expectedKeys = ALL_ANSWER_KEYS.slice(0, n);
          if (answerKeys.join(',') !== expectedKeys.join(',')) {
            return fail(
              `${at}.answers keys must be a contiguous sequence starting from A ` +
              `(e.g. A,B or A,B,C,D). Found: ${answerKeys.join(',')}`
            );
          }
          for (const k of answerKeys) {
            if (typeof q.answers[k] !== 'string' || q.answers[k].trim() === '') {
              return fail(`${at}.answers.${k} must be a non-empty string.`);
            }
          }

          // correct: must be one of the keys actually present in answers
          if (!answerKeys.includes(q.correct)) {
            return fail(
              `${at}.correct must be one of the answer keys (${answerKeys.join(', ')}). ` +
              `Got: "${q.correct}"`
            );
          }

          // annotation: if present and non-null, must have type + content
          if (q.annotation !== null && q.annotation !== undefined) {
            if (typeof q.annotation !== 'object' || Array.isArray(q.annotation)) {
              return fail(`${at}.annotation must be an object or null.`);
            }
            if (typeof q.annotation.type !== 'string' || q.annotation.type.trim() === '') {
              return fail(`${at}.annotation.type must be a non-empty string.`);
            }
            if (typeof q.annotation.content !== 'string' || q.annotation.content.trim() === '') {
              return fail(`${at}.annotation.content must be a non-empty string.`);
            }
          }

          // figure: if present and non-null, must have file and alt (both non-empty strings)
          if (q.figure !== null && q.figure !== undefined) {
            if (typeof q.figure !== 'object' || Array.isArray(q.figure)) {
              return fail(`${at}.figure must be an object or null.`);
            }
            if (typeof q.figure.file !== 'string' || q.figure.file.trim() === '') {
              return fail(`${at}.figure.file must be a non-empty string.`);
            }
            if (typeof q.figure.alt !== 'string' || q.figure.alt.trim() === '') {
              return fail(`${at}.figure.alt must be a non-empty string (used for accessibility and AI context).`);
            }
          }

          // preamble: optional object with file + label
          if (q.preamble !== null && q.preamble !== undefined) {
            if (typeof q.preamble !== 'object' || Array.isArray(q.preamble)) {
              return fail(`${at}.preamble must be an object or omitted.`);
            }
            if (typeof q.preamble.file !== 'string' || q.preamble.file.trim() === '') {
              return fail(`${at}.preamble.file must be a non-empty string.`);
            }
            if (typeof q.preamble.label !== 'string' || q.preamble.label.trim() === '') {
              return fail(`${at}.preamble.label must be a non-empty string.`);
            }
          }

          // Structure cross-references (only enforced when structure is present)
          if (hasStructure) {
            if (q.subelement && !validSubelements.has(q.subelement)) {
              return fail(
                `${at}.subelement "${q.subelement}" is not defined in structure.subelements.`
              );
            }
            if (q.group && !validGroups.has(q.group)) {
              return fail(
                `${at}.group "${q.group}" is not defined in structure.`
              );
            }
          }
        }

        return { valid: true, bank };
      }

      /**
       * Read a plain JSON File and return a validated bank.
       * @param  {File} file
       * @returns {Promise<{ valid: true, bank: object, imageMap: null } | { valid: false, error: string }>}
       */
      function load(file) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            let parsed;
            try {
              parsed = JSON.parse(e.target.result);
            } catch (err) {
              resolve(fail(`Invalid JSON: ${err.message}`));
              return;
            }
            const result = validate(parsed);
            resolve(result.valid ? { ...result, imageMap: null } : result);
          };
          reader.onerror = () => resolve(fail('Could not read file.'));
          reader.readAsText(file);
        });
      }

      /**
       * Read a ZIP File, extract bank.json and any referenced figures.
       * Figures are extracted as blob URLs stored in a Map<filename, url>.
       * @param  {File} file
       * @returns {Promise<{ valid: true, bank: object, imageMap: Map } | { valid: false, error: string }>}
       */
      async function loadZip(file) {
        if (typeof JSZip === 'undefined') {
          return fail('JSZip library not loaded. Check your internet connection and reload.');
        }

        let zip;
        try {
          zip = await JSZip.loadAsync(file);
        } catch (err) {
          return fail(`Could not read ZIP: ${err.message}`);
        }

        // Extract and parse bank.json from zip root
        const bankEntry = zip.file('bank.json');
        if (!bankEntry) {
          return fail('ZIP must contain bank.json at the root level.');
        }
        let parsed;
        try {
          const text = await bankEntry.async('text');
          parsed = JSON.parse(text);
        } catch (err) {
          return fail(`Invalid JSON in bank.json: ${err.message}`);
        }

        // Validate schema
        const result = validate(parsed);
        if (!result.valid) return result;

        // Extract referenced figure images into blob URLs.
        // Deduplicate first — multiple questions may reference the same file,
        // and calling entry.async() repeatedly on the same ZIP entry can
        // produce empty/corrupt blobs on some JSZip versions.
        const imageMap = new Map();
        const uniqueFigureFiles = [...new Set(
          result.bank.questions
            .filter(q => q.figure && q.figure.file)
            .map(q => q.figure.file)
        )];

        for (const filename of uniqueFigureFiles) {
          const entry = zip.file(`figures/${filename}`);
          if (!entry) {
            return fail(`Figure file not found in ZIP: figures/${filename}`);
          }
          const blob = await entry.async('blob');
          imageMap.set(filename, URL.createObjectURL(blob));
        }

        // Extract preamble text files
        const preambleMap = new Map();
        const uniquePreambleFiles = [...new Set(
          result.bank.questions
            .filter(q => q.preamble && q.preamble.file)
            .map(q => q.preamble.file)
        )];
        for (const filename of uniquePreambleFiles) {
          const entry = zip.file(`preambles/${filename}`);
          if (!entry) {
            return fail(`Preamble file not found in ZIP: preambles/${filename}`);
          }
          const text = await entry.async('text');
          preambleMap.set(filename, text);
        }

        return { valid: true, bank: result.bank, imageMap, preambleMap };
      }

      /**
       * Normalise a Google Drive share URL to a direct download URL.
       * Other URLs are returned unchanged.
       *   https://drive.google.com/file/d/FILE_ID/view?...
       *   → https://drive.google.com/uc?export=download&id=FILE_ID
       */
      function normalizeGoogleDriveUrl(url) {
        const m = url.match(/drive\.google\.com\/file\/d\/([^/?#]+)/);
        return m
          ? `https://drive.google.com/uc?export=download&id=${m[1]}`
          : url;
      }

      /**
       * Fetch a bank from a URL (.json or .zip).
       * Handles Google Drive share links automatically.
       * @param  {string} rawUrl
       * @returns {Promise<{ valid: true, bank: object, imageMap: Map|null } | { valid: false, error: string }>}
       */
      async function loadFromUrl(rawUrl) {
        const url = normalizeGoogleDriveUrl(rawUrl.trim());

        let response;
        try {
          response = await fetch(url);
        } catch (err) {
          // fetch() throws TypeError on CORS block or network failure
          return fail(
            'Could not fetch URL. This may be a network or CORS error. ' +
            'Host the file on GitHub Pages or another CORS-enabled server, ' +
            'then paste the direct link here.'
          );
        }

        if (!response.ok) {
          return fail(`HTTP ${response.status} — could not load bank from URL.`);
        }

        // Detect format: prefer URL extension, fall back to Content-Type
        const lower = url.split('?')[0].toLowerCase();
        const ct    = response.headers.get('content-type') || '';
        const isZip = lower.endsWith('.zip') ||
                      ct.includes('zip') ||
                      ct.includes('octet-stream');

        if (isZip) {
          try {
            const blob = await response.blob();
            const file = new File([blob], 'bank.zip', { type: 'application/zip' });
            return loadZip(file);
          } catch (err) {
            return fail(`Could not read ZIP from URL: ${err.message}`);
          }
        } else {
          let text;
          try {
            text = await response.text();
          } catch (err) {
            return fail(`Could not read response: ${err.message}`);
          }
          let parsed;
          try {
            parsed = JSON.parse(text);
          } catch (err) {
            return fail(`Invalid JSON at URL: ${err.message}`);
          }
          const result = validate(parsed);
          return result.valid ? { ...result, imageMap: null } : result;
        }
      }

      return { validate, load, loadZip, loadFromUrl };
    })();


    /* ============================================================
       MODULE: Storage
       Thin wrappers around sessionStorage and localStorage.
       API key lives in sessionStorage only (cleared on tab close).
       All other state lives in localStorage.
       ============================================================ */
    const Storage = (() => {
      const K_APIKEY        = 'q-primer:apikey';       // sessionStorage — cleared on tab close
      const K_APIKEY_SAVED  = 'q-primer:apikey-saved'; // localStorage  — persists across sessions
      const K_STUDENT   = 'q-primer:student';
      const K_SESSION   = 'q-primer:session';
      const K_LAST_BANK = 'q-primer:last-bank';        // localStorage  — { source, url?, filename? }

      function safeGet(store, key) {
        try { return JSON.parse(store.getItem(key)); }
        catch { return null; }
      }

      return {
        // ── API key (sessionStorage — cleared on tab close) ──────
        getApiKey()    { return sessionStorage.getItem(K_APIKEY) || ''; },
        setApiKey(k)   { k ? sessionStorage.setItem(K_APIKEY, k) : sessionStorage.removeItem(K_APIKEY); },
        clearApiKey()  { sessionStorage.removeItem(K_APIKEY); },

        // ── Remembered API key (localStorage — persists) ─────────
        getRememberedKey()   { return localStorage.getItem(K_APIKEY_SAVED) || ''; },
        setRememberedKey(k)  { k ? localStorage.setItem(K_APIKEY_SAVED, k) : localStorage.removeItem(K_APIKEY_SAVED); },
        clearRememberedKey() { localStorage.removeItem(K_APIKEY_SAVED); },

        // ── Last bank (localStorage — source + url or filename) ─
        getLastBank()   { return safeGet(localStorage, K_LAST_BANK); },
        setLastBank(o)  { localStorage.setItem(K_LAST_BANK, JSON.stringify(o)); },
        clearLastBank() { localStorage.removeItem(K_LAST_BANK); },

        // ── Student profile (localStorage) ──────────────────────
        getStudent()   { return safeGet(localStorage, K_STUDENT); },
        setStudent(o)  { localStorage.setItem(K_STUDENT, JSON.stringify(o)); },

        // ── Session state (localStorage) ────────────────────────
        getSession()   { return safeGet(localStorage, K_SESSION); },
        setSession(o)  { localStorage.setItem(K_SESSION, JSON.stringify(o)); },
        clearSession() { localStorage.removeItem(K_SESSION); },
      };
    })();


    /* ============================================================
       MODULE: AppState
       Top-level in-memory state. Does not touch the DOM.
       ============================================================ */
    const AppState = (() => {
      let _phase       = 'SETUP'; // 'SETUP' | 'STUDY'
      let _bank        = null;
      let _imageMap    = null;   // Map<filename, blobURL> — populated from ZIP banks
      let _preambleMap = null;   // Map<filename, text>   — populated from ZIP banks

      return {
        getPhase()   { return _phase; },
        setPhase(p)  { _phase = p; },
        getBank()    { return _bank; },
        setBank(b)   { _bank = b; },
        clearBank()  { _bank = null; },
        hasBank()    { return _bank !== null; },
        hasApiKey()  { return Storage.getApiKey().length > 0; },

        getImageMap()   { return _imageMap; },
        setImageMap(m)  { _imageMap = m; },
        /** Revoke all blob URLs and clear the map. */
        clearImageMap() {
          if (_imageMap) {
            for (const url of _imageMap.values()) URL.revokeObjectURL(url);
          }
          _imageMap = null;
        },

        getPreambleMap()   { return _preambleMap; },
        setPreambleMap(m)  { _preambleMap = m; },
        clearPreambleMap() { _preambleMap = null; },
      };
    })();


    /* ============================================================
       MODULE: SessionState
       Owns the session object lifecycle: create, restore, persist.
       All mutations go through this module; no one else writes
       to localStorage directly for session data.
       ============================================================ */
    const SessionState = (() => {

      let _state = null; // full state tree (session + student + coach_context)

      /** RFC 4122 UUID v4 */
      function uuid() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
          const r = crypto.getRandomValues(new Uint8Array(1))[0] % 16;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
      }

      function persist() {
        if (_state) {
          _state.session.last_active = new Date().toISOString();
          Storage.setSession(_state);
        }
      }

      /**
       * Initialise session for a bank.
       * Restores existing session if bank_id matches; otherwise starts fresh.
       * @returns {{ restored: boolean }}
       */
      function init(bankPoolId) {
        const saved = Storage.getSession();
        if (saved && saved.session && saved.session.bank_id === bankPoolId) {
          _state = saved;
          persist(); // bump last_active
          return { restored: true };
        }

        _state = {
          session: {
            id:            uuid(),
            bank_id:       bankPoolId,
            started_at:    new Date().toISOString(),
            last_active:   new Date().toISOString(),
            filter:        { subelement: null, group: null, mode: 'random' },
            progress:      { answered: [], correct: [], wrong: [], skipped: [] },
            token_usage:   { session_input: 0, session_output: 0, session_total: 0 },
            questionOrder: null,
          },
          student:       Storage.getStudent() || { profile: '', created_at: new Date().toISOString() },
          coach_context: { session_summary: null },
        };
        persist();
        return { restored: false };
      }

      function getState()  { return _state; }
      function getSession(){ return _state ? _state.session : null; }

      function setQuestionOrder(order) {
        if (!_state) return;
        _state.session.questionOrder = order;
        persist();
      }

      /**
       * Record a submitted answer.
       * A question can only move from unanswered → answered once.
       */
      function recordAnswer(id, choice, isCorrect) {
        if (!_state) return;
        const p = _state.session.progress;
        if (p.answered.includes(id)) return; // idempotent
        p.answered.push(id);
        if (isCorrect) p.correct.push(id);
        else           p.wrong.push(id);
        persist();
      }

      function recordSkip(id) {
        if (!_state) return;
        const p = _state.session.progress;
        if (p.answered.includes(id)) return;
        p.answered.push(id);
        p.skipped.push(id);
        persist();
      }

      function updateTokenUsage(inputTokens, outputTokens) {
        if (!_state) return;
        const t = _state.session.token_usage;
        t.session_input  += inputTokens;
        t.session_output += outputTokens;
        t.session_total  += inputTokens + outputTokens;
        persist();
      }

      return { init, getState, getSession, setQuestionOrder,
               recordAnswer, recordSkip, updateTokenUsage };
    })();


    /* ============================================================
       MODULE: QuizEngine
       Handles question ordering (Fisher-Yates, one shuffle per
       session), selection, answer recording, and completion state.
       No DOM access. Calls UI and SessionState only.
       ============================================================ */
    const QuizEngine = (() => {

      let _bank = null;

      /** Fisher-Yates in-place shuffle on a copy. */
      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function getStats() {
        const sess = SessionState.getSession();
        if (!_bank || !sess) return { correct:0, answered:0, total:0, remaining:0, skipped:0 };
        const p = sess.progress;
        const total = _bank.questions.length;
        return {
          correct:   p.correct.length,
          answered:  p.answered.length,
          total,
          remaining: total - p.answered.length,
          skipped:   p.skipped.length,
        };
      }

      function isComplete() {
        const sess = SessionState.getSession();
        if (!_bank || !sess) return false;
        return sess.progress.answered.length >= _bank.questions.length;
      }

      /**
       * Return the next unanswered question in session order, or null.
       */
      function getNextQuestion() {
        const sess = SessionState.getSession();
        if (!_bank || !sess || !sess.questionOrder) return null;
        const answered = new Set(sess.progress.answered);
        for (const id of sess.questionOrder) {
          if (!answered.has(id)) {
            return _bank.questions.find(q => q.id === id) || null;
          }
        }
        return null;
      }

      /**
       * Initialise or restore a session, then render the first question.
       * Called by UI.transitionToStudy().
       */
      function startSession(bank) {
        _bank = bank;
        SessionState.init(bank.meta.pool_id);

        // Shuffle once; restore order on session resume
        const sess = SessionState.getSession();
        if (!sess.questionOrder) {
          SessionState.setQuestionOrder(shuffle(bank.questions.map(q => q.id)));
        }

        UI.updateSessionBar(getStats());

        if (isComplete()) {
          UI.renderCompletion(getStats());
        } else {
          UI.renderQuestion(getNextQuestion());
        }
      }

      /**
       * Record a submitted answer and return whether it was correct.
       */
      function submitAnswer(question, choice) {
        const isCorrect = choice === question.correct;
        SessionState.recordAnswer(question.id, choice, isCorrect);
        UI.updateSessionBar(getStats());
        return isCorrect;
      }

      function skipQuestion(question) {
        SessionState.recordSkip(question.id);
        UI.updateSessionBar(getStats());
      }

      /**
       * Advance to the next question, or show completion screen.
       */
      function advance() {
        if (isComplete()) {
          UI.renderCompletion(getStats());
        } else {
          UI.renderQuestion(getNextQuestion());
        }
      }

      return { startSession, submitAnswer, skipQuestion, advance,
               getNextQuestion, isComplete, getStats };
    })();


    /* ============================================================
       MODULE: MarkdownRenderer
       Converts a markdown string to safe HTML.
       Pure function — no DOM access, no side effects.
       Handles: paragraphs, **bold**, *italic*, `inline code`,
       fenced code blocks, bullet lists, numbered lists, headings.
       All text content is HTML-escaped before tag insertion.
       ============================================================ */
    const MarkdownRenderer = (() => {

      /** Escape HTML special characters in a plain-text string. */
      function esc(s) {
        return s
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      /**
       * Process inline markdown on an already-HTML-escaped string.
       * Splits on code spans first so markdown inside `code` is left alone.
       */
      function inline(raw) {
        // Split into [text, `code`, text, `code`, ...] segments
        const segs = raw.split(/(`[^`\n]+`)/g);
        return segs.map((seg, i) => {
          if (i % 2 === 1) {
            // Code span — escape content, wrap in <code>
            return `<code>${esc(seg.slice(1, -1))}</code>`;
          }
          // Plain text — escape, then apply bold and italic
          let s = esc(seg);
          s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
          s = s.replace(/\*([^*\n]+)\*/g,     '<em>$1</em>');
          return s;
        }).join('');
      }

      function render(text) {
        if (!text) return '';

        const lines  = text.split('\n');
        const out    = [];

        let inFence   = false;
        let fenceLines = [];
        let paraLines  = [];
        let listItems  = [];
        let listOrdered = false;

        function flushPara() {
          if (!paraLines.length) return;
          out.push(`<p>${paraLines.map(inline).join(' ')}</p>`);
          paraLines = [];
        }

        function flushList() {
          if (!listItems.length) return;
          const tag = listOrdered ? 'ol' : 'ul';
          out.push(
            `<${tag}>${listItems.map(item => `<li>${inline(item)}</li>`).join('')}</${tag}>`
          );
          listItems = [];
        }

        for (const line of lines) {

          // ── Fenced code block ───────────────────────────────
          if (line.startsWith('```')) {
            if (!inFence) {
              flushPara(); flushList();
              inFence = true; fenceLines = [];
            } else {
              inFence = false;
              out.push(`<pre><code>${fenceLines.map(esc).join('\n')}</code></pre>`);
            }
            continue;
          }
          if (inFence) { fenceLines.push(line); continue; }

          // ── Blank line ──────────────────────────────────────
          if (!line.trim()) { flushList(); flushPara(); continue; }

          // ── Heading (map to h3–h5 to stay within document hierarchy) ──
          const hm = line.match(/^(#{1,3})\s+(.+)/);
          if (hm) {
            flushPara(); flushList();
            const level = hm[1].length + 2; // ## → h4, ### → h5
            out.push(`<h${level}>${inline(hm[2])}</h${level}>`);
            continue;
          }

          // ── Unordered list item ─────────────────────────────
          const ul = line.match(/^[-*]\s+(.+)/);
          if (ul) {
            flushPara();
            if (listItems.length && listOrdered) flushList();
            listOrdered = false;
            listItems.push(ul[1]);
            continue;
          }

          // ── Ordered list item ───────────────────────────────
          const ol = line.match(/^\d+\.\s+(.+)/);
          if (ol) {
            flushPara();
            if (listItems.length && !listOrdered) flushList();
            listOrdered = true;
            listItems.push(ol[1]);
            continue;
          }

          // ── Regular text ────────────────────────────────────
          flushList();
          paraLines.push(line);
        }

        // Flush any remaining state
        flushList();
        flushPara();
        if (inFence && fenceLines.length) {
          out.push(`<pre><code>${fenceLines.map(esc).join('\n')}</code></pre>`);
        }

        return out.join('\n');
      }

      return { render };
    })();


    /* ============================================================
       MODULE: PromptBuilder
       Constructs system prompt and per-question user messages.
       Pure functions — no DOM access, no API calls.
       ============================================================ */
    const PromptBuilder = (() => {

      /**
       * Build the system prompt from bank metadata and student profile.
       */
      function buildSystem(bank, student) {
        const parts = [
          `You are an expert exam coach helping a student prepare for the ${bank.meta.title} examination.`,
        ];

        if (bank.meta.description) {
          parts.push(bank.meta.description);
        }

        if (bank.meta.reference_sheet && bank.meta.reference_sheet.trim()) {
          // Strip markup tags — AI reads raw content directly
          const sheetText = bank.meta.reference_sheet.replace(/<\/?(code|table)>/g, '');
          parts.push(`Reference sheet (available to student for all questions):\n${sheetText}`);
        }

        if (student && student.profile && student.profile.trim()) {
          parts.push(`Student background: ${student.profile.trim()}`);
        }

        parts.push(
          `Your role is to explain why the correct answer is right and help the student build genuine understanding — not just memorize answers.

Guidelines:
- Be concise but thorough. Aim for 150–250 words on the initial explanation.
- Lead immediately with the core concept. Do not open with praise or filler phrases.
- For calculations, show the key formula and steps.
- For rules or regulations, explain the underlying principle, not just the rule number.
- When the student chose incorrectly, be direct about what misconception the distractor exploits.
- Use plain language. Define technical terms on first use.
- Use markdown: **bold** for key terms, \`code\` for values, formulas, and units.
- For math, use Unicode notation (e.g. V², ×, Ω, μ, ≈, √) and \`code\` spans rather than LaTeX.`
        );

        return parts.join('\n\n');
      }

      /**
       * Build the user message for an initial question explanation.
       */
      function buildExplainMessage(question, chosenKey) {
        const isCorrect = chosenKey === question.correct;
        const lines = [];

        lines.push(`Question: ${question.question}`);

        if (question.figure) {
          lines.push(`Figure: ${question.figure.alt}`);
        }

        if (question.preamble) {
          const preambleMap = AppState.getPreambleMap();
          const ptext = preambleMap && preambleMap.get(question.preamble.file);
          if (ptext) {
            // Strip markup tags — AI reads raw content directly
            const clean = ptext.replace(/<\/?(code|table)>/g, '');
            lines.push(`\nReference material (${question.preamble.label}):\n${clean}`);
          }
        }

        lines.push('\nAnswer choices:');
        for (const key of Object.keys(question.answers).sort()) {
          lines.push(`  ${key}: ${question.answers[key]}`);
        }

        lines.push(`\nCorrect answer: ${question.correct} — ${question.answers[question.correct]}`);
        lines.push(
          `Student chose: ${chosenKey} — ${question.answers[chosenKey]} ` +
          `(${isCorrect ? 'correct ✓' : 'incorrect ✗'})`
        );

        if (question.annotation && question.annotation.content) {
          lines.push(`\nAnnotation: ${question.annotation.content}`);
        }

        lines.push(
          `\nExplain why ${question.correct} is correct` +
          (!isCorrect
            ? ` and address why ${chosenKey} is a plausible but wrong choice.`
            : '.')
        );

        return lines.join('\n');
      }

      return { buildSystem, buildExplainMessage };
    })();


    /* ============================================================
       MODULE: CoachAPI
       Calls the Anthropic Messages API. Manages per-question
       conversation history for follow-up support.
       Depends on: Storage, AppState, SessionState,
                   PromptBuilder, MarkdownRenderer, UI.
       ============================================================ */
    const CoachAPI = (() => {

      const MODEL      = 'claude-haiku-4-5';
      const MAX_TOKENS = 1024;

      let _history         = [];   // messages array for current question
      let _currentQuestion = null;
      let _busy            = false;

      /** Clear conversation state for a new question. */
      function reset() {
        _history         = [];
        _currentQuestion = null;
        _busy            = false;
      }

      /** POST to the Anthropic Messages API; throws on error. */
      async function _call(messages) {
        const key = Storage.getApiKey();
        if (!key) throw new Error('No API key configured.');

        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key':                              key,
            'anthropic-version':                      '2023-06-01',
            'content-type':                           'application/json',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model:      MODEL,
            max_tokens: MAX_TOKENS,
            system:     PromptBuilder.buildSystem(
                          AppState.getBank(),
                          SessionState.getState()?.student
                        ),
            messages,
          }),
        });

        if (!res.ok) {
          let msg = res.statusText;
          try { const b = await res.json(); msg = b.error?.message || msg; } catch {}
          if (res.status === 401) throw new Error('Invalid API key. Check the key you entered and try again.');
          if (res.status === 429) throw new Error('Rate limit reached. Wait a moment, then try your question again.');
          throw new Error(`API error ${res.status}: ${msg}`);
        }

        return res.json();
      }

      /** Accumulate token usage into the session and update the display. */
      function _recordUsage(usage) {
        SessionState.updateTokenUsage(usage.input_tokens, usage.output_tokens);
        const t = SessionState.getSession().token_usage;
        UI.updateTokenUsage(t.session_input, t.session_output);
      }

      /**
       * Request an explanation after the student submits an answer.
       * Called automatically from the submit handler — silent no-op if no key.
       */
      async function explain(question, chosenKey) {
        if (!Storage.getApiKey() || _busy) return;
        _busy            = true;
        _currentQuestion = question;
        _history         = [];

        UI.showCoachLoading();

        const userMsg = PromptBuilder.buildExplainMessage(question, chosenKey);
        _history.push({ role: 'user', content: userMsg });

        try {
          const data = await _call(_history);
          const text = data.content[0].text;
          _history.push({ role: 'assistant', content: text });
          _recordUsage(data.usage);
          UI.showCoachResponse(MarkdownRenderer.render(text));
        } catch (err) {
          UI.showCoachError(err.message);
        } finally {
          _busy = false;
        }
      }

      /**
       * Send a follow-up question in the context of the current question.
       * Appends to the ongoing conversation history.
       */
      async function followUp(text) {
        if (!text.trim() || _busy || !_currentQuestion) return;
        _busy = true;

        const trimmed = text.trim();
        _history.push({ role: 'user', content: trimmed });

        UI.appendCoachMessage('user', trimmed);
        UI.showFollowUpLoading();

        try {
          const data  = await _call(_history);
          const reply = data.content[0].text;
          _history.push({ role: 'assistant', content: reply });
          _recordUsage(data.usage);
          UI.appendCoachMessage('assistant', MarkdownRenderer.render(reply));
        } catch (err) {
          UI.appendCoachMessage('error', err.message);
        } finally {
          _busy = false;
        }
      }

      return { explain, followUp, reset };
    })();


    /* ============================================================
       MODULE: UI
       All DOM reads and writes live here.
       Other modules have zero DOM access.
       ============================================================ */
    const UI = (() => {

      // ── Element cache ────────────────────────────────────────────
      const el = {
        setupPanel:      document.getElementById('setup-panel'),
        studyView:       document.getElementById('study-view'),

        // Setup form
        bankFileInput:   document.getElementById('bank-file-input'),
        bankDropZone:    document.getElementById('bank-drop-zone'),
        bankDropInner:   document.getElementById('bank-drop-inner'),
        bankStatus:      document.getElementById('bank-status'),
        bankUrlInput:    document.getElementById('bank-url-input'),
        bankUrlBtn:      document.getElementById('bank-url-btn'),
        apiKeyInput:     document.getElementById('api-key-input'),
        rememberKeyCheck:document.getElementById('remember-key-check'),
        profileInput:    document.getElementById('profile-input'),
        startBtn:        document.getElementById('start-btn'),
        startHint:       document.getElementById('start-hint'),
        startFreshWrap:  document.getElementById('start-fresh-wrap'),
        startFreshBtn:   document.getElementById('start-fresh-btn'),

        // Session bar
        scoreDisplay:    document.getElementById('score-display'),
        scoreLabel:      document.getElementById('score-label'),
        remainingDisplay:document.getElementById('remaining-display'),
        endSessionBtn:   document.getElementById('end-session-btn'),
        refSheetBtn:     document.getElementById('ref-sheet-btn'),

        // Reference sheet modal
        refModal:        document.getElementById('ref-modal'),
        refModalBody:    document.getElementById('ref-modal-body'),
        refModalClose:   document.getElementById('ref-modal-close'),

        // Panels
        questionPanel:   document.getElementById('question-panel'),
        coachContent:    document.getElementById('coach-content'),
        followupInput:   document.getElementById('followup-input'),
        followupSendBtn: document.getElementById('followup-send-btn'),
        tokenUsage:      document.getElementById('token-usage-display'),
      };

      // ── Setup: bank status display ────────────────────────────────

      function showBankLoaded(bank) {
        const count = bank.questions.length;
        el.bankDropZone.classList.remove('is-error');
        el.bankDropZone.classList.add('is-loaded');

        el.bankDropInner.querySelector('.bank-drop-icon').textContent    = '✓';
        el.bankDropInner.querySelector('.bank-drop-primary').textContent = bank.meta.title;
        el.bankDropInner.querySelector('.bank-drop-sub').textContent     =
          `${count} question${count !== 1 ? 's' : ''} loaded`;

        el.bankStatus.className     = 'is-success';
        el.bankStatus.textContent   =
          `${count} questions · ${bank.meta.pool_id} v${bank.meta.version}`;
      }

      function showBankError(message) {
        el.bankDropZone.classList.remove('is-loaded');
        el.bankDropZone.classList.add('is-error');

        el.bankDropInner.querySelector('.bank-drop-icon').textContent    = '✗';
        el.bankDropInner.querySelector('.bank-drop-primary').textContent = 'Load failed — click to retry';
        el.bankDropInner.querySelector('.bank-drop-sub').textContent     = '';

        el.bankStatus.className   = 'is-error';
        el.bankStatus.textContent = message;
      }

      function resetBankZone(lastFilename) {
        el.bankFileInput.value = ''; // clear so re-selecting the same file fires change
        el.bankDropZone.classList.remove('is-loaded', 'is-error');
        el.bankDropInner.querySelector('.bank-drop-icon').textContent    = '📂';
        el.bankDropInner.querySelector('.bank-drop-primary').textContent = 'Click to load a question bank';
        el.bankDropInner.querySelector('.bank-drop-sub').textContent     =
          lastFilename ? `Last used: ${lastFilename}` : '.json or .zip';
        el.bankStatus.className   = '';
        el.bankStatus.textContent = '';
      }

      // ── Setup: start button ───────────────────────────────────────

      function refreshStartButton() {
        const hasBank = AppState.hasBank();
        const hasKey  = AppState.hasApiKey();

        // API key is optional — the quiz works without it; coaching just won't fire.
        el.startBtn.disabled = !hasBank;
        el.startFreshWrap.hidden = true;

        if (!hasBank) {
          el.startBtn.textContent  = 'Start Studying';
          el.startHint.textContent = 'Load a question bank to begin.';
          return;
        }

        // Check for a resumable session matching the loaded bank.
        const bank  = AppState.getBank();
        const saved = Storage.getSession();
        if (saved && saved.session && saved.session.bank_id === bank.meta.pool_id) {
          const answered = saved.session.progress.answered.length;
          const total    = bank.questions.length;
          if (answered > 0) {
            const done = answered >= total ? 'Session complete.' : `${answered}/${total} questions answered.`;
            el.startBtn.textContent  = answered >= total ? 'Review Completed Session' : 'Resume Session';
            el.startHint.textContent = `${done}${!hasKey ? ' No API key — AI coaching will be unavailable.' : ''}`;
            el.startFreshWrap.hidden = false;
            return;
          }
        }

        el.startBtn.textContent  = 'Start Studying';
        el.startHint.textContent = hasKey ? '' : 'No API key — AI coaching will be unavailable.';
      }

      // ── Setup: event handlers ─────────────────────────────────────

      async function onBankFile(file) {
        if (!file) return;
        el.bankStatus.className   = '';
        el.bankStatus.textContent = 'Validating…';

        const isZip = file.name.toLowerCase().endsWith('.zip');
        const result = isZip
          ? await BankLoader.loadZip(file)
          : await BankLoader.load(file);

        if (result.valid) {
          AppState.setBank(result.bank);
          AppState.setImageMap(result.imageMap || null);
          AppState.setPreambleMap(result.preambleMap || null);
          showBankLoaded(result.bank);
          Storage.setLastBank({ source: 'file', filename: file.name });
        } else {
          AppState.clearBank();
          AppState.clearImageMap();
          AppState.clearPreambleMap();
          showBankError(result.error);
        }
        refreshStartButton();
      }

      async function onBankUrl() {
        const raw = el.bankUrlInput.value.trim();
        if (!raw) return;

        el.bankUrlBtn.disabled    = true;
        el.bankStatus.className   = '';
        el.bankStatus.textContent = 'Fetching…';

        const result = await BankLoader.loadFromUrl(raw);

        if (result.valid) {
          AppState.setBank(result.bank);
          AppState.setImageMap(result.imageMap || null);
          AppState.setPreambleMap(result.preambleMap || null);
          showBankLoaded(result.bank);
          Storage.setLastBank({ source: 'url', url: raw });
          el.bankUrlInput.value = ''; // clear on success
        } else {
          AppState.clearBank();
          AppState.clearImageMap();
          showBankError(result.error);
        }

        el.bankUrlBtn.disabled = false;
        refreshStartButton();
      }

      function onApiKeyInput() {
        const val = el.apiKeyInput.value.trim();
        Storage.setApiKey(val);
        if (el.rememberKeyCheck.checked) {
          Storage.setRememberedKey(val);
        }
        refreshStartButton();
      }

      function onRememberKeyChange() {
        if (el.rememberKeyCheck.checked) {
          Storage.setRememberedKey(el.apiKeyInput.value.trim());
        } else {
          Storage.clearRememberedKey();
        }
      }

      function onProfileInput() {
        const existing = Storage.getStudent() || {};
        Storage.setStudent({
          ...existing,
          profile:    el.profileInput.value,
          updated_at: new Date().toISOString(),
        });
      }

      function onStartStudying() {
        const existing = Storage.getStudent();
        if (!existing || !existing.created_at) {
          Storage.setStudent({
            profile:    el.profileInput.value,
            created_at: new Date().toISOString(),
          });
        }
        transitionToStudy();
      }

      // ── State transitions ─────────────────────────────────────────

      function transitionToStudy() {
        AppState.setPhase('STUDY');
        el.setupPanel.hidden = true;
        el.studyView.hidden  = false;

        // Reference sheet: populate modal and show button if bank has one
        const bank = AppState.getBank();
        if (bank.meta.reference_sheet) {
          el.refModalBody.innerHTML = '';
          renderTagged(bank.meta.reference_sheet, el.refModalBody, { paragraphs: true });
          el.refSheetBtn.hidden = false;
        } else {
          el.refSheetBtn.hidden = true;
        }

        // QuizEngine.startSession() wired in Chunk B
        if (typeof QuizEngine !== 'undefined') {
          QuizEngine.startSession(bank);
        }
      }

      function transitionToSetup() {
        AppState.setPhase('SETUP');
        AppState.clearBank();
        AppState.clearImageMap();    // revokes blob URLs
        AppState.clearPreambleMap();
        el.refSheetBtn.hidden = true;
        el.refModal.hidden    = true;
        // Session progress is preserved in localStorage for resume.
        // clearSession() is NOT called here — use "Start Fresh" to wipe explicitly.

        el.studyView.hidden  = true;
        el.setupPanel.hidden = false;

        // Restore remembered key (if any); otherwise clear the field.
        const remembered = Storage.getRememberedKey();
        if (remembered) {
          el.apiKeyInput.value      = remembered;
          el.rememberKeyCheck.checked = true;
          Storage.setApiKey(remembered);
        } else {
          Storage.clearApiKey();
          el.apiKeyInput.value        = '';
          el.rememberKeyCheck.checked = false;
        }

        const lastBank = Storage.getLastBank();
        const lastFilename = (lastBank && lastBank.source === 'file') ? lastBank.filename : null;
        resetBankZone(lastFilename);
        refreshStartButton();

        // Reset coach/question panels for next session
        el.coachContent.innerHTML = '';
        const placeholder = document.createElement('div');
        placeholder.className   = 'coach-placeholder';
        placeholder.textContent = 'Answer a question to see a coaching explanation here.';
        el.coachContent.appendChild(placeholder);

        el.followupInput.value    = '';
        el.followupInput.disabled = true;
        el.followupSendBtn.disabled = true;
        el.tokenUsage.textContent = '';
      }

      // ── Session bar updates (called by QuizEngine / SessionState, Chunk B+) ──

      function updateSessionBar({ correct, answered, total, remaining }) {
        const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
        el.scoreDisplay.textContent = answered > 0
          ? `${correct}/${answered} (${pct}%)`
          : '–';
        el.scoreLabel.textContent = answered > 0 ? ' correct' : '';
        el.remainingDisplay.textContent =
          remaining > 0 ? `${remaining} remaining` : 'all answered';
      }

      // ── Coach panel helpers (called by CoachAPI, Chunk C) ─────────

      function showCoachLoading() {
        el.coachContent.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'coach-loading';
        for (let i = 0; i < 4; i++) {
          const bar = document.createElement('div');
          bar.className = 'coach-loading-bar';
          div.appendChild(bar);
        }
        el.coachContent.appendChild(div);
        el.coachContent.scrollTop = 0;
      }

      function showCoachResponse(htmlContent) {
        el.coachContent.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'coach-response';
        div.innerHTML = htmlContent;  // sanitized markdown output only — see CoachAPI
        el.coachContent.appendChild(div);

        el.followupInput.disabled   = false;
        el.followupSendBtn.disabled = false;
      }

      function showCoachError(message) {
        el.coachContent.innerHTML = '';
        const div = document.createElement('div');
        div.className   = 'coach-error';
        div.textContent = message;
        el.coachContent.appendChild(div);
      }

      function updateTokenUsage(sessionInput, sessionOutput) {
        const total = sessionInput + sessionOutput;
        el.tokenUsage.textContent =
          total > 0
            ? `session tokens: ${total.toLocaleString()} (↑${sessionInput.toLocaleString()} ↓${sessionOutput.toLocaleString()})`
            : '';
      }

      // ── Question panel rendering (Chunk B) ───────────────────────

      /**
       * Render prose text that may contain `backtick` inline code spans.
       * Appends text nodes and <code class="inline-code"> elements to container.
       * Called by renderTagged for every prose segment.
       */
      function renderInline(text, container) {
        const parts = text.split(/`([^`\n]+)`/);
        parts.forEach((part, i) => {
          if (i % 2 === 0) {
            if (part) container.appendChild(document.createTextNode(part));
          } else {
            const code = document.createElement('code');
            code.className = 'inline-code';
            code.textContent = part;
            container.appendChild(code);
          }
        });
      }

      /**
       * Parse pipe-delimited table content into a <table> DOM element.
       * First non-separator row becomes <thead>; remaining rows become <tbody>.
       * Separator lines (e.g. |---|---| from Markdown) are silently ignored.
       * Table cells support `backtick` inline code via renderInline.
       */
      function buildTable(content) {
        const lines = content.trim().split('\n')
          .map(l => l.trim())
          .filter(l => l && !/^[\|:\-\s]+$/.test(l)); // skip separator rows

        if (!lines.length) return null;

        function parseCells(line) {
          let cells = line.split('|').map(c => c.trim());
          if (cells[0] === '') cells = cells.slice(1);       // leading |
          if (cells[cells.length - 1] === '') cells = cells.slice(0, -1); // trailing |
          return cells;
        }

        const table   = document.createElement('table');
        table.className = 'q-table';

        const thead   = document.createElement('thead');
        const hrow    = document.createElement('tr');
        parseCells(lines[0]).forEach(cell => {
          const th = document.createElement('th');
          renderInline(cell, th);
          hrow.appendChild(th);
        });
        thead.appendChild(hrow);
        table.appendChild(thead);

        if (lines.length > 1) {
          const tbody = document.createElement('tbody');
          lines.slice(1).forEach(line => {
            const tr = document.createElement('tr');
            parseCells(line).forEach(cell => {
              const td = document.createElement('td');
              renderInline(cell, td);
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
        }

        return table;
      }

      /**
       * Parse markup in a string and append resulting DOM nodes to `container`.
       * Safe — no innerHTML used anywhere.
       *
       * Supported markup:
       *   `backtick`              → inline <code> span (preferred for identifiers)
       *   <code>text</code>       → inline <code> span (no newlines in content)
       *   <code>\nblock\n</code>  → <pre><code> block  (content has newlines)
       *   <table>\nrows\n</table> → <table> element (pipe-delimited rows)
       *
       * When `paragraphs: true`, prose segments are split on blank lines and
       * each chunk is wrapped in a <p>. Use for preamble files and reference_sheet.
       *
       * @param {string}  text
       * @param {Element} container
       * @param {{ paragraphs?: boolean }} [opts]
       */
      function renderTagged(text, container, { paragraphs = false } = {}) {
        // Split on block-level tags, keeping the matched tag as a captured group.
        const parts = text.split(/(<code>[\s\S]*?<\/code>|<table>[\s\S]*?<\/table>)/);

        parts.forEach((part, i) => {
          if (i % 2 === 0) {
            // Prose segment — apply backtick inline code, optional paragraph wrapping
            if (!part) return;
            if (paragraphs) {
              part.split(/\n\n+/).filter(c => c.trim()).forEach(chunk => {
                const p = document.createElement('p');
                renderInline(chunk.trim(), p);
                container.appendChild(p);
              });
            } else {
              renderInline(part, container);
            }
          } else if (part.startsWith('<table>')) {
            const content = part.slice(7, -8); // strip <table> and </table>
            const tableEl = buildTable(content);
            if (tableEl) container.appendChild(tableEl);
          } else {
            // <code>...</code> — inline or block by newline detection
            const content = part.slice(6, -7); // strip <code> and </code>
            if (content.includes('\n')) {
              const pre  = document.createElement('pre');
              const code = document.createElement('code');
              code.textContent = content.replace(/^\n/, '').replace(/\n$/, '');
              pre.appendChild(code);
              container.appendChild(pre);
            } else {
              const code = document.createElement('code');
              code.className = 'inline-code';
              code.textContent = content;
              container.appendChild(code);
            }
          }
        });
      }

      /**
       * Render a question into the question panel.
       * Text content rendered via renderTagged — supports <code> markup.
       */
      function renderQuestion(question) {
        el.questionPanel.innerHTML = '';
        resetCoachPanel();

        // Meta line: question ID + reference
        if (question.id || question.reference) {
          const meta = document.createElement('div');
          meta.className = 'q-meta';
          const idEl = document.createElement('span');
          idEl.textContent = question.id;
          meta.appendChild(idEl);
          if (question.reference) {
            const refEl = document.createElement('span');
            refEl.textContent = `[${question.reference}]`;
            meta.appendChild(refEl);
          }
          el.questionPanel.appendChild(meta);
        }

        // Preamble (if present — rendered above question text, collapsible)
        if (question.preamble) {
          const preambleMap = AppState.getPreambleMap();
          const ptext = preambleMap && preambleMap.get(question.preamble.file);
          if (ptext !== undefined) {
            const details  = document.createElement('details');
            details.className = 'q-preamble';
            details.open   = true;
            const summary  = document.createElement('summary');
            summary.textContent = question.preamble.label;
            const content  = document.createElement('div');
            content.className = 'q-preamble-content';
            renderTagged(ptext, content, { paragraphs: true });
            details.appendChild(summary);
            details.appendChild(content);
            el.questionPanel.appendChild(details);
          } else {
            const notice = document.createElement('div');
            notice.className   = 'q-figure-missing';
            notice.textContent =
              `⚠ Preamble "${question.preamble.file}" not loaded — reload the bank to display it.`;
            el.questionPanel.appendChild(notice);
          }
        }

        // Question text
        const qText = document.createElement('div');
        qText.className = 'q-text';
        renderTagged(question.question, qText);
        el.questionPanel.appendChild(qText);

        // Figure (if present — rendered between question text and answers)
        if (question.figure) {
          const imageMap = AppState.getImageMap();
          const src = imageMap && imageMap.get(question.figure.file);
          if (src) {
            const figEl = document.createElement('figure');
            figEl.className = 'q-figure';
            const img = document.createElement('img');
            img.src       = src;
            img.alt       = question.figure.alt;
            img.className = 'q-figure-img';
            figEl.appendChild(img);
            el.questionPanel.appendChild(figEl);
          } else {
            // Figure referenced but not in imageMap — surface this visibly
            // rather than silently skipping (likely cause: bank not reloaded
            // after ending a session, or ZIP extraction issue).
            const notice = document.createElement('div');
            notice.className   = 'q-figure-missing';
            notice.textContent =
              `⚠ Figure "${question.figure.file}" not loaded — reload the bank to display it.`;
            el.questionPanel.appendChild(notice);
          }
        }

        // Answer choice buttons
        const choices = document.createElement('div');
        choices.className = 'answer-choices';
        const buttons = {};
        let selectedChoice = null;

        for (const key of Object.keys(question.answers).sort()) {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.dataset.key = key;

          const keyEl = document.createElement('span');
          keyEl.className = 'answer-key';
          keyEl.textContent = key;

          const textEl = document.createElement('span');
          renderTagged(question.answers[key], textEl);

          btn.appendChild(keyEl);
          btn.appendChild(textEl);

          btn.addEventListener('click', () => {
            if (selectedChoice) buttons[selectedChoice].classList.remove('is-selected');
            selectedChoice = key;
            btn.classList.add('is-selected');
            submitBtn.disabled = false;
          });

          choices.appendChild(btn);
          buttons[key] = btn;
        }
        el.questionPanel.appendChild(choices);

        // Action row
        const actions = document.createElement('div');
        actions.className = 'q-actions';

        const submitBtn = document.createElement('button');
        submitBtn.className = 'btn btn-submit';
        submitBtn.textContent = 'Submit';
        submitBtn.disabled = true;

        const skipBtn = document.createElement('button');
        skipBtn.className = 'btn btn-ghost';
        skipBtn.textContent = 'Skip';

        submitBtn.addEventListener('click', () => {
          if (!selectedChoice) return;

          // Lock inputs
          submitBtn.disabled = true;
          skipBtn.disabled   = true;
          for (const btn of Object.values(buttons)) btn.disabled = true;

          const isCorrect = QuizEngine.submitAnswer(question, selectedChoice);

          // Reveal result with a brief delay for the CSS transition to feel intentional
          setTimeout(() => {
            for (const key of ['A', 'B', 'C', 'D']) {
              const btn = buttons[key];
              if (key === question.correct) {
                btn.classList.remove('is-selected');
                btn.classList.add('is-correct');
              } else if (key === selectedChoice && !isCorrect) {
                btn.classList.remove('is-selected');
                btn.classList.add('is-incorrect');
              } else if (key !== question.correct) {
                btn.classList.add('is-dimmed');
              }
            }
            showNextButton(actions);

            // Wrong answer: explain automatically.
            // Correct answer: show a Discuss button — user initiates if they want.
            if (typeof CoachAPI !== 'undefined') {
              if (!isCorrect) {
                CoachAPI.explain(question, selectedChoice);
              } else {
                showDiscussButton(actions, question, selectedChoice);
              }
            }
          }, 200);
        });

        skipBtn.addEventListener('click', () => {
          submitBtn.disabled = true;
          skipBtn.disabled   = true;
          for (const btn of Object.values(buttons)) btn.disabled = true;
          QuizEngine.skipQuestion(question);
          showNextButton(actions);
        });

        actions.appendChild(submitBtn);
        actions.appendChild(skipBtn);
        el.questionPanel.appendChild(actions);
      }

      /** Append the "Next Question →" button to the actions row. */
      function showNextButton(actionsEl) {
        const nextBtn = document.createElement('button');
        nextBtn.className   = 'btn btn-accent-outline';
        nextBtn.textContent = 'Next Question →';
        nextBtn.addEventListener('click', () => QuizEngine.advance());
        actionsEl.appendChild(nextBtn);
      }

      /**
       * Append a "Discuss" button to the actions row (correct-answer path).
       * Clicking it triggers the AI explanation on demand, then removes the button.
       */
      function showDiscussButton(actionsEl, question, chosenKey) {
        const discussBtn = document.createElement('button');
        discussBtn.className   = 'btn btn-ghost';
        discussBtn.textContent = 'Discuss ↗';
        discussBtn.addEventListener('click', () => {
          discussBtn.remove();
          CoachAPI.explain(question, chosenKey);
        });
        actionsEl.appendChild(discussBtn);
      }

      /** Render the session-complete summary in the question panel. */
      function renderCompletion(stats) {
        el.questionPanel.innerHTML = '';
        resetCoachPanel();

        const screen = document.createElement('div');
        screen.id = 'completion-screen';

        const heading = document.createElement('h2');
        heading.textContent = 'SESSION COMPLETE';

        const pct = stats.answered > 0
          ? Math.round((stats.correct / stats.answered) * 100) : 0;

        const bigScore = document.createElement('div');
        bigScore.className = 'completion-big-score';
        // Safe: correct and answered are integers from our own state
        bigScore.textContent = `${stats.correct}`;
        const denom = document.createElement('span');
        denom.textContent = `/${stats.answered}`;
        bigScore.appendChild(denom);

        const statsEl = document.createElement('div');
        statsEl.className = 'completion-stats';

        const lines = [
          `${pct}% correct`,
          `${stats.skipped} skipped`,
          `${stats.total} questions in bank`,
        ];
        lines.forEach((line, i) => {
          if (i > 0) statsEl.appendChild(document.createElement('br'));
          statsEl.appendChild(document.createTextNode(line));
        });

        const backBtn = document.createElement('button');
        backBtn.className   = 'btn btn-primary';
        backBtn.style.maxWidth = '220px';
        backBtn.textContent = 'Back to Setup';
        backBtn.addEventListener('click', () => transitionToSetup());

        screen.appendChild(heading);
        screen.appendChild(bigScore);
        screen.appendChild(statsEl);
        screen.appendChild(backBtn);
        el.questionPanel.appendChild(screen);
      }

      /** Reset coach panel to its idle placeholder state. */
      function resetCoachPanel() {
        if (typeof CoachAPI !== 'undefined') CoachAPI.reset();
        el.coachContent.innerHTML = '';
        const p = document.createElement('div');
        p.className   = 'coach-placeholder';
        p.textContent = 'Answer a question to see a coaching explanation here.';
        el.coachContent.appendChild(p);
        el.followupInput.value      = '';
        el.followupInput.disabled   = true;
        el.followupSendBtn.disabled = true;
      }

      /**
       * Disable the follow-up send button while a follow-up is in flight.
       * Does not replace coach content — previous response stays visible.
       */
      function showFollowUpLoading() {
        el.followupInput.disabled   = true;
        el.followupSendBtn.disabled = true;
      }

      /**
       * Append a message block to the coach content area.
       * role: 'user' | 'assistant' | 'error'
       * content: plain text for user/error; rendered HTML for assistant
       */
      function appendCoachMessage(role, content) {
        const hr = document.createElement('hr');
        hr.className = 'coach-divider';
        el.coachContent.appendChild(hr);

        const div = document.createElement('div');
        if (role === 'user') {
          div.className   = 'coach-question';
          div.textContent = content;
        } else if (role === 'assistant') {
          div.className = 'coach-response';
          div.innerHTML = content; // sanitized MarkdownRenderer output only
        } else {
          div.className   = 'coach-error';
          div.textContent = content;
        }
        el.coachContent.appendChild(div);
        el.coachContent.scrollTop = el.coachContent.scrollHeight;

        // Re-enable follow-up after response or error
        if (role === 'assistant' || role === 'error') {
          el.followupInput.disabled   = false;
          el.followupSendBtn.disabled = false;
        }
      }

      // ── Init ─────────────────────────────────────────────────────

      function init() {
        // Restore saved profile
        const saved = Storage.getStudent();
        if (saved && saved.profile) {
          el.profileInput.value = saved.profile;
        }

        // Restore API key: prefer localStorage remembered key, fall back to sessionStorage
        const rememberedKey = Storage.getRememberedKey();
        if (rememberedKey) {
          el.apiKeyInput.value        = rememberedKey;
          el.rememberKeyCheck.checked = true;
          Storage.setApiKey(rememberedKey); // populate sessionStorage for this tab
        } else {
          const sessionKey = Storage.getApiKey();
          if (sessionKey) el.apiKeyInput.value = sessionKey;
        }

        // Restore last bank
        const lastBank = Storage.getLastBank();
        if (lastBank) {
          if (lastBank.source === 'url' && lastBank.url) {
            // URL bank — auto-fetch silently
            el.bankUrlInput.value = lastBank.url;
            onBankUrl(); // async, runs in background — no await needed here
          } else if (lastBank.source === 'file' && lastBank.filename) {
            // File bank — can't reopen automatically; show hint in drop zone
            resetBankZone(lastBank.filename);
          }
        }

        // Wire events
        el.bankFileInput.addEventListener('change', (e) => onBankFile(e.target.files[0]));
        el.bankUrlBtn.addEventListener('click', onBankUrl);
        el.bankUrlInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); onBankUrl(); }
        });
        el.apiKeyInput.addEventListener('input', onApiKeyInput);
        el.rememberKeyCheck.addEventListener('change', onRememberKeyChange);
        el.profileInput.addEventListener('input', onProfileInput);
        el.startBtn.addEventListener('click', onStartStudying);
        el.endSessionBtn.addEventListener('click', transitionToSetup);

        // Reference sheet modal
        el.refSheetBtn.addEventListener('click', () => { el.refModal.hidden = false; });
        el.refModalClose.addEventListener('click', () => { el.refModal.hidden = true; });
        el.refModal.addEventListener('click', (e) => {
          if (e.target === el.refModal) el.refModal.hidden = true; // backdrop dismiss
        });
        el.startFreshBtn.addEventListener('click', () => {
          Storage.clearSession();
          refreshStartButton();
        });

        // Follow-up dialog
        el.followupSendBtn.addEventListener('click', () => {
          const text = el.followupInput.value.trim();
          if (!text) return;
          el.followupInput.value = '';
          CoachAPI.followUp(text);
        });
        el.followupInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            el.followupSendBtn.click();
          }
        });

        refreshStartButton();
      }

      // ── Public API ────────────────────────────────────────────────
      return {
        init,
        transitionToStudy,
        transitionToSetup,
        refreshStartButton,
        updateSessionBar,
        renderQuestion,
        renderCompletion,
        showCoachLoading,
        showCoachResponse,
        showCoachError,
        showFollowUpLoading,
        appendCoachMessage,
        updateTokenUsage,
      };
    })();


    /* ============================================================
       INIT
       ============================================================ */
    document.addEventListener('DOMContentLoaded', () => {
      UI.init();
    });

  </script>
</body>
</html>
