<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q-Primer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    /* ============================================================
       DESIGN TOKENS
       ============================================================ */
    :root {
      --bg:             #0f1117;
      --surface:        #1a1d27;
      --border:         #2e3347;
      --accent:         #4a9eff;
      --correct:        #22c55e;
      --incorrect:      #ef4444;
      --text-primary:   #e8eaf0;
      --text-secondary: #8b90a7;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
      --session-bar-h:  44px;
      --radius:         6px;
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    [hidden] { display: none !important; }

    /* ============================================================
       SHARED FORM ELEMENTS
       ============================================================ */
    .field-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    .text-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 0.6rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .text-input:focus          { border-color: var(--accent); }
    .text-input::placeholder   { color: var(--text-secondary); }
    textarea.text-input        { resize: vertical; min-height: 88px; line-height: 1.5; }

    .field-hint {
      margin-top: 0.3rem;
      font-size: 0.72rem;
      color: var(--text-secondary);
    }

    /* Buttons */
    .btn {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary {
      width: 100%;
      padding: 0.65rem 1.5rem;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: none;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }

    .btn-ghost {
      padding: 0.5rem 1rem;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--text-secondary); color: var(--text-primary); }

    .btn-accent-outline {
      padding: 0.5rem 1.25rem;
      background: var(--surface);
      color: var(--accent);
      font-weight: 600;
      border: 1px solid var(--accent);
      animation: slide-up 0.2s ease-out;
    }
    .btn-accent-outline:hover:not(:disabled) { background: rgba(74,158,255,0.1); }

    .btn-submit {
      padding: 0.5rem 1.25rem;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      border: none;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.88; }

    .btn-danger-ghost {
      padding: 0.28rem 0.65rem;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      font-size: 0.72rem;
    }
    .btn-danger-ghost:hover { border-color: var(--incorrect); color: var(--incorrect); }

    /* Animations */
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.7;  }
    }

    /* ============================================================
       SETUP PANEL
       ============================================================ */
    #setup-panel {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .setup-card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
    }

    .setup-wordmark {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.06em;
      margin-bottom: 0.2rem;
    }

    .setup-tagline {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .setup-section { margin-bottom: 1.4rem; }
    .setup-section:last-child { margin-bottom: 0; }

    hr.setup-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* Bank drop zone */
    .bank-drop-zone {
      position: relative;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .bank-drop-zone:hover          { border-color: var(--accent); background: rgba(74,158,255,0.04); }
    .bank-drop-zone.is-loaded      { border-style: solid; border-color: var(--correct);   background: rgba(34,197,94,0.04); }
    .bank-drop-zone.is-error       { border-style: solid; border-color: var(--incorrect); background: rgba(239,68,68,0.04);  }

    .bank-drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .bank-drop-inner { pointer-events: none; }

    .bank-drop-icon    { font-size: 1.4rem; display: block; margin-bottom: 0.35rem; color: var(--text-secondary); }
    .bank-drop-primary { font-size: 0.85rem; color: var(--text-primary); }
    .bank-drop-sub     { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.2rem; }

    #bank-status {
      margin-top: 0.5rem;
      font-size: 0.78rem;
      min-height: 1.1em;
    }
    #bank-status.is-success { color: var(--correct); }
    #bank-status.is-error   { color: var(--incorrect); }

    /* URL bank loader row */
    .bank-url-row {
      display: flex;
      gap: 0.45rem;
      margin-top: 0.5rem;
    }
    .bank-url-row .text-input { flex: 1; min-width: 0; }

    /* Remember-key label */
    .remember-key-label {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      cursor: pointer;
      font-size: 0.72rem;
      color: var(--text-secondary);
    }
    .remember-key-label input[type="checkbox"] { cursor: pointer; }

    #start-hint {
      text-align: center;
      margin-top: 0.45rem;
      font-size: 0.72rem;
      color: var(--text-secondary);
      min-height: 1.1em;
    }

    /* ============================================================
       SESSION BAR
       ============================================================ */
    #session-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--session-bar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      z-index: 100;
    }

    .sbar-left  { display: flex; align-items: center; gap: 1.25rem; }
    .sbar-right { display: flex; align-items: center; gap: 1rem; }

    .sbar-wordmark  { font-size: 0.78rem; font-weight: 600; color: var(--accent); letter-spacing: 0.06em; }
    .sbar-score     { font-size: 0.78rem; color: var(--text-secondary); }
    .sbar-score strong { color: var(--text-primary); font-weight: 500; }
    .sbar-remaining { font-size: 0.72rem; color: var(--text-secondary); }

    /* ============================================================
       STUDY VIEW
       ============================================================ */
    #study-view {
      padding-top: var(--session-bar-h);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .study-columns {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ============================================================
       QUESTION PANEL
       ============================================================ */
    #question-panel {
      width: 55%;
      padding: 2rem;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .q-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.72rem;
      color: var(--text-secondary);
    }

    .q-text {
      font-family: var(--font-sans);
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text-primary);
    }

    /* Answer buttons */
    .answer-choices { display: flex; flex-direction: column; gap: 0.45rem; }

    .answer-btn {
      width: 100%;
      text-align: left;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      line-height: 1.5;
      padding: 0.6rem 0.875rem;
      cursor: pointer;
      transition: border-color 0.1s, background 0.1s, opacity 0.2s;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }
    .answer-btn:hover:not(:disabled)  { border-color: var(--accent); background: rgba(74,158,255,0.04); }
    .answer-btn.is-selected            { border-color: var(--accent);    background: rgba(74,158,255,0.08); }
    .answer-btn.is-correct             { border-color: var(--correct);   background: rgba(34,197,94,0.1);  transition: background 0.2s, border-color 0.2s; }
    .answer-btn.is-incorrect           { border-color: var(--incorrect); background: rgba(239,68,68,0.1);  transition: background 0.2s, border-color 0.2s; }
    .answer-btn.is-dimmed              { opacity: 0.38; }
    .answer-btn:disabled               { cursor: default; }

    .answer-key {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      flex-shrink: 0;
      padding-top: 2px;
    }
    .answer-btn.is-selected .answer-key,
    .answer-btn.is-correct  .answer-key { color: var(--text-primary); }

    /* Question figure */
    .q-figure     { margin: 0; text-align: center; }
    .q-figure-img {
      max-width: 100%;
      max-height: 300px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
    }
    .q-figure-missing {
      font-size: 0.78rem;
      color: var(--incorrect);
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
      text-align: center;
    }

    /* Inline code spans (inside question text, answer text, preamble prose) */
    code.inline-code {
      font-family: var(--font-mono);
      font-size: 0.875em;
      background: rgba(74,158,255,0.12);
      color: #93c5fd;
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* Code blocks (question text, answer buttons, preamble, reference sheet) */
    .q-text pre,
    .answer-btn pre,
    .q-preamble-content pre,
    .ref-modal-body pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      overflow-x: auto;
      margin: 0.5rem 0;
      white-space: pre;
    }
    .q-text pre code,
    .answer-btn pre code,
    .q-preamble-content pre code,
    .ref-modal-body pre code {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--text-primary);
    }

    /* Preamble collapsible block */
    .q-preamble {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .q-preamble > summary {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      padding: 0.5rem 0.875rem;
      cursor: pointer;
      background: rgba(255,255,255,0.03);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      user-select: none;
    }
    .q-preamble > summary::before {
      content: '▶';
      font-size: 0.6rem;
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .q-preamble[open] > summary::before { transform: rotate(90deg); }
    .q-preamble-content {
      padding: 1rem 1rem 0.25rem;
      font-size: 0.88rem;
      line-height: 1.75;
      color: var(--text-primary);
    }
    .q-preamble-content p { margin-bottom: 0.65rem; }
    .q-preamble-content p:last-child { margin-bottom: 0.75rem; }

    /* Data tables (rendered from <table>...</table> markup) */
    .q-table {
      border-collapse: collapse;
      font-size: 0.84rem;
      margin: 0.5rem 0;
      white-space: nowrap;
    }
    .q-table th,
    .q-table td {
      border: 1px solid var(--border);
      padding: 0.3rem 0.875rem;
    }
    .q-table th {
      background: rgba(255,255,255,0.04);
      font-weight: 600;
      color: var(--text-secondary);
      text-align: center;
    }
    .q-table td {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    /* First column is typically a row label like (A), (B) */
    .q-table td:first-child {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-align: center;
    }

    /* Reference sheet modal */
    #ref-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 200;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-y: auto;
    }
    #ref-modal[hidden] { display: none; }
    .ref-modal-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 860px;
      max-height: calc(100vh - 4rem);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .ref-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .ref-modal-title { font-weight: 600; font-size: 0.82rem; color: var(--text-primary); }
    .ref-modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary); font-size: 1rem;
      padding: 0.2rem 0.5rem; border-radius: var(--radius);
      transition: background 0.1s, color 0.1s;
    }
    .ref-modal-close:hover { background: var(--border); color: var(--text-primary); }
    .ref-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      font-size: 0.88rem;
      line-height: 1.75;
      color: var(--text-primary);
    }
    .ref-modal-body p { margin-bottom: 0.65rem; }
    .ref-modal-body p:last-child { margin-bottom: 0; }

    /* Question action row */
    .q-actions { display: flex; gap: 0.65rem; align-items: center; }

    /* ============================================================
       COACH PANEL
       ============================================================ */
    #coach-panel {
      width: 45%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #coach-content {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
    }

    .coach-placeholder {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Loading pulse bars */
    .coach-loading { display: flex; flex-direction: column; gap: 0.45rem; }
    .coach-loading-bar {
      height: 9px;
      background: var(--border);
      border-radius: 3px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .coach-loading-bar:nth-child(1)              { width: 100%; }
    .coach-loading-bar:nth-child(2)              { width: 83%;  animation-delay: 0.15s; }
    .coach-loading-bar:nth-child(3)              { width: 91%;  animation-delay: 0.3s;  }
    .coach-loading-bar:nth-child(4)              { width: 67%;  animation-delay: 0.45s; }

    /* Coach response */
    .coach-response { animation: fade-in 0.3s ease-out; }

    .coach-response p           { font-family: var(--font-sans); font-size: 0.875rem; line-height: 1.7; color: var(--text-primary); margin-bottom: 0.75rem; }
    .coach-response p:last-child{ margin-bottom: 0; }
    .coach-response strong      { font-weight: 600; }
    .coach-response em          { font-style: italic; }

    .coach-response code {
      font-family: var(--font-mono);
      font-size: 0.82em;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1em 0.35em;
    }

    .coach-response pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.875rem;
      margin: 0.75rem 0;
      overflow-x: auto;
    }
    .coach-response pre code { background: none; border: none; padding: 0; font-size: 0.82rem; line-height: 1.6; }

    /* Follow-up question bubble */
    .coach-question {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: rgba(74,158,255,0.06);
      border-left: 2px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.75rem;
    }

    /* Divider between coach messages */
    .coach-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1rem 0;
    }

    /* Error state */
    .coach-error {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      color: var(--incorrect);
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius);
      padding: 0.75rem;
    }

    /* Coach footer */
    .coach-footer {
      border-top: 1px solid var(--border);
      padding: 0.65rem 0.875rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .coach-followup { display: flex; gap: 0.45rem; align-items: flex-end; }

    .coach-followup-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      padding: 0.45rem 0.7rem;
      outline: none;
      resize: none;
      min-height: 34px;
      max-height: 96px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .coach-followup-input:focus       { border-color: var(--accent); }
    .coach-followup-input::placeholder { color: var(--text-secondary); }

    .btn-followup-send {
      padding: 0.35rem 0.65rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .btn-followup-send:hover:not(:disabled) { opacity: 0.88; }
    .btn-followup-send:disabled             { opacity: 0.35; cursor: not-allowed; }

    #token-usage-display {
      font-size: 0.68rem;
      color: var(--text-secondary);
      text-align: right;
      min-height: 1em;
    }

    /* ============================================================
       COMPLETION SCREEN
       ============================================================ */
    #completion-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 2rem;
      text-align: center;
      gap: 1.1rem;
      animation: fade-in 0.4s ease-out;
    }

    #completion-screen h2      { font-size: 1rem; font-weight: 600; color: var(--accent); letter-spacing: 0.04em; }
    .completion-big-score      { font-size: 2.2rem; font-weight: 600; color: var(--text-primary); }
    .completion-big-score span { font-size: 1rem; color: var(--text-secondary); font-weight: 400; }
    .completion-stats          { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.9; }

    /* ============================================================
       RESPONSIVE — single column on mobile
       ============================================================ */
    @media (max-width: 768px) {
      #study-view     { height: auto; min-height: 100vh; }

      .study-columns  { flex-direction: column; overflow-y: auto; }

      #question-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        overflow-y: visible;
      }

      #coach-panel    { width: 100%; min-height: 280px; }

      .sbar-remaining { display: none; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       SETUP PANEL
       ============================================================ -->
  <div id="setup-panel">
    <div class="setup-card">

      <div class="setup-wordmark">Q-PRIMER</div>
      <div class="setup-tagline">AI-coached exam preparation</div>

      <!-- 1. Bank loader -->
      <div class="setup-section">
        <label class="field-label">Question Bank</label>
        <div class="bank-drop-zone" id="bank-drop-zone">
          <input type="file" id="bank-file-input" accept=".json,.zip"
                 aria-label="Load question bank JSON or ZIP file">
